                <!-- Usage 统计 -->
                <div
                    v-show="mainTab === 'usage'"
                    class="mode-content"
                    id="panel-usage"
                    role="tabpanel"
                    :aria-labelledby="'tab-usage'">
                    <div class="usage-toolbar">
                        <div class="selector-header" style="padding:0;border:0;background:none;">
                            <span class="selector-title">本地使用概览</span>
                        </div>
                        <div class="usage-range-group" role="group" aria-label="Usage 时间范围">
                            <button type="button" class="usage-range-btn" :class="{ active: sessionsUsageTimeRange === '7d' }" @click="sessionsUsageTimeRange = '7d'">近 7 天</button>
                            <button type="button" class="usage-range-btn" :class="{ active: sessionsUsageTimeRange === '30d' }" @click="sessionsUsageTimeRange = '30d'">近 30 天</button>
                            <button type="button" class="usage-range-btn" :class="{ active: sessionsUsageTimeRange === 'all' }" @click="sessionsUsageTimeRange = 'all'">全部</button>
                            <button type="button" class="usage-range-btn" @click="loadSessionsUsage({ forceRefresh: true })" :disabled="sessionsUsageLoading">{{ sessionsUsageLoading ? '刷新中...' : '刷新统计' }}</button>
                        </div>
                    </div>

                    <div v-if="sessionsUsageLoading && !sessionsUsageList.length" class="session-empty">正在加载 Usage 统计...</div>
                    <div v-else-if="sessionsUsageError && !sessionsUsageList.length" class="usage-empty">{{ sessionsUsageError }}</div>
                    <div v-else-if="!sessionsUsageList.length" class="usage-empty">暂无可用于统计的会话数据</div>
                    <template v-else>
                        <div class="usage-summary-grid">
                            <div v-for="card in sessionUsageSummaryCards" :key="card.key" class="usage-summary-card">
                                <div class="usage-summary-label">{{ card.label }}</div>
                                <div class="usage-summary-value" :title="card.title || null">{{ card.value }}</div>
                                <div v-if="card.note" class="usage-summary-note">{{ card.note }}</div>
                            </div>
                        </div>

                        <div class="usage-chart-grid">
                            <section class="usage-card">
                                <div class="usage-card-title">会话趋势</div>
                                <div class="usage-legend">
                                    <span><span class="usage-legend-dot" style="background:#4f8cff"></span>Codex</span>
                                    <span><span class="usage-legend-dot" style="background:#b277ff"></span>Claude</span>
                                </div>
                                <div class="usage-bars">
                                    <div v-for="bucket in sessionUsageCharts.buckets" :key="bucket.key" class="usage-bar-group">
                                        <div class="usage-bar-stack">
                                            <div class="usage-bar codex" :style="{ height: ((bucket.codex / Math.max(sessionUsageCharts.maxSessionBucket, 1)) * 100) + '%' }" :title="`Codex ${bucket.codex}`"></div>
                                            <div class="usage-bar claude" :style="{ height: ((bucket.claude / Math.max(sessionUsageCharts.maxSessionBucket, 1)) * 100) + '%' }" :title="`Claude ${bucket.claude}`"></div>
                                        </div>
                                        <div class="usage-bar-label">{{ bucket.label }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">消息趋势</div>
                                <div class="usage-bars">
                                    <div v-for="bucket in sessionUsageCharts.buckets" :key="bucket.key + '-messages'" class="usage-bar-group">
                                        <div class="usage-bar-stack">
                                            <div class="usage-bar codex" style="width:100%" :style="{ height: ((bucket.totalMessages / Math.max(sessionUsageCharts.maxMessageBucket, 1)) * 100) + '%' }" :title="`${bucket.totalMessages} messages`"></div>
                                        </div>
                                        <div class="usage-bar-label">{{ bucket.label }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">活跃时段</div>
                                <div class="usage-mini-bars">
                                    <div v-for="item in sessionUsageCharts.hourActivity" :key="item.key" class="usage-mini-bar-group">
                                        <div class="usage-mini-bar-track" :title="`${item.label}:00 · ${item.count} 次会话`">
                                            <div class="usage-mini-bar-fill" :style="{ height: item.percent + '%' }"></div>
                                        </div>
                                        <div class="usage-mini-bar-label">{{ item.label }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">来源洞察</div>
                                <div class="usage-list">
                                    <div v-for="item in sessionUsageCharts.sourceShare" :key="item.key" class="usage-list-row">
                                        <div class="usage-list-label">{{ item.label }}</div>
                                        <div class="usage-progress"><div class="usage-progress-fill" :style="{ width: item.percent + '%' }"></div></div>
                                        <div class="usage-list-value">{{ item.percent }}%</div>
                                        <div class="usage-list-subvalue">{{ item.value }} 会话 · {{ item.messageTotal }} 消息 · 均值 {{ item.avgMessages }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card usage-card-models">
                                <div class="usage-card-head">
                                    <div>
                                        <div class="usage-card-title">使用模型</div>
                                        <div class="usage-card-subtitle">按当前时间范围统计已识别模型名，不再把缺失情况藏起来。</div>
                                    </div>
                                    <div class="usage-card-kicker">覆盖 {{ sessionUsageCharts.modelCoverage.modeledSessions }}/{{ sessionUsageCharts.modelCoverage.totalSessions }}</div>
                                </div>
                                <div class="usage-model-coverage-strip">
                                    <div class="usage-model-coverage-item">
                                        <strong>{{ sessionUsageCharts.usedModels.length }}</strong>
                                        <span>已识别模型</span>
                                    </div>
                                    <div class="usage-model-coverage-item">
                                        <strong>{{ sessionUsageCharts.modelCoverage.coveragePercent }}%</strong>
                                        <span>模型覆盖率</span>
                                    </div>
                                    <div class="usage-model-coverage-item">
                                        <strong>{{ sessionUsageCharts.modelCoverage.missingModelSessions }}</strong>
                                        <span>缺少模型名</span>
                                    </div>
                                </div>
                                <div v-if="!sessionUsageCharts.usedModels.length" class="usage-diagnostic-empty">
                                    <div class="usage-diagnostic-title">当前范围内没读到模型名</div>
                                    <div class="usage-diagnostic-copy">
                                        已扫描 {{ sessionUsageCharts.modelCoverage.totalSessions }} 个会话，但这些会话没有可识别的 `model / modelName / modelId` 字段，所以这里没法列出模型。
                                    </div>
                                    <div class="usage-diagnostic-meta">
                                        Codex {{ sessionUsageCharts.modelCoverage.missingModelSourceTotals.codex || 0 }} 个，Claude Code {{ sessionUsageCharts.modelCoverage.missingModelSourceTotals.claude || 0 }} 个。
                                    </div>
                                </div>
                                <template v-else>
                                    <div v-if="sessionUsageCharts.modelCoverage.providerOnlySessions > 0" class="usage-inline-note">
                                        还有 {{ sessionUsageCharts.modelCoverage.missingModelSessions }} 个会话没写具体模型名，其中
                                        <span
                                            v-for="item in sessionUsageCharts.modelCoverage.missingModelProviders"
                                            :key="item.key"
                                            class="usage-inline-tag">
                                            {{ item.label }} {{ item.count }} 个
                                        </span>
                                        属于旧记录只写了 provider、没写真实 model，不能硬编成某个 `gpt-*`。
                                    </div>
                                    <div v-else-if="sessionUsageCharts.modelCoverage.missingModelSessions > 0" class="usage-inline-note">
                                        还有 {{ sessionUsageCharts.modelCoverage.missingModelSessions }} 个会话缺少模型名，所以当前列表不是 100% 完整覆盖。
                                    </div>
                                    <div v-if="sessionUsageCharts.modelCoverage.missingModelSessionsPreview.length" class="usage-diagnostic-list">
                                        <div class="usage-diagnostic-list-title">当前仍缺模型名的会话</div>
                                        <div
                                            v-for="item in sessionUsageCharts.modelCoverage.missingModelSessionsPreview"
                                            :key="item.key"
                                            class="usage-diagnostic-row">
                                            <div class="usage-diagnostic-row-main">
                                                <div class="usage-diagnostic-row-title">{{ item.title }}</div>
                                                <div class="usage-diagnostic-row-meta">
                                                    <span>{{ item.sourceLabel }}</span>
                                                    <span v-if="item.sessionId">{{ item.sessionId }}</span>
                                                    <span v-else-if="item.updatedAtLabel">{{ item.updatedAtLabel }}</span>
                                                </div>
                                            </div>
                                            <div class="usage-diagnostic-row-side">
                                                <span v-if="item.provider" class="usage-inline-tag">{{ item.provider }}</span>
                                                <span class="usage-inline-stat">{{ item.reasonLabel }}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="usage-model-list">
                                        <div v-for="item in sessionUsageCharts.usedModels" :key="item.key" class="usage-model-chip" :title="`${item.model} · ${item.count} 会话 · ${item.messageTotal} 消息${item.tokenTotal ? ` · ${item.tokenTotal} token` : ''}`">
                                            <div class="usage-model-name">{{ item.model }}</div>
                                            <div class="usage-model-meta">{{ item.count }} 会话<span v-if="item.sourceLabels.length"> · {{ item.sourceLabels.join(' / ') }}</span></div>
                                        </div>
                                    </div>
                                </template>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">工作日分布</div>
                                <div class="usage-list">
                                    <div v-for="item in sessionUsageCharts.weekdayActivity" :key="item.key" class="usage-list-row usage-list-row-compact">
                                        <div class="usage-list-label">{{ item.label }}</div>
                                        <div class="usage-progress"><div class="usage-progress-fill" :style="{ width: item.percent + '%' }"></div></div>
                                        <div class="usage-list-value">{{ item.count }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">高频路径</div>
                                <div v-if="!sessionUsageCharts.topPaths.length" class="usage-list-value">暂无路径数据</div>
                                <div v-else class="usage-list">
                                    <div v-for="item in sessionUsageCharts.topPaths" :key="item.path" class="usage-list-row">
                                        <div class="usage-list-label">{{ item.count }} 次</div>
                                        <div class="usage-progress"><div class="usage-progress-fill" :style="{ width: ((item.count / Math.max((sessionUsageCharts.topPaths.length ? sessionUsageCharts.topPaths[0].count : 1), 1)) * 100) + '%' }"></div></div>
                                        <div class="usage-list-value" :title="item.path">{{ item.path }}</div>
                                        <div class="usage-list-subvalue">{{ item.messageTotal }} 消息<span v-if="item.updatedAtLabel"> · 最近 {{ item.updatedAtLabel }}</span></div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">近期活跃会话</div>
                                <div v-if="!sessionUsageCharts.recentSessions.length" class="usage-list-value">暂无会话数据</div>
                                <div v-else class="usage-session-list">
                                    <div v-for="item in sessionUsageCharts.recentSessions" :key="item.key" class="usage-session-item">
                                        <div class="usage-session-row">
                                            <div class="usage-session-title" :title="item.title">{{ item.title }}</div>
                                            <span :class="['pill', item.source === 'codex' ? 'configured' : 'empty']">{{ item.sourceLabel }}</span>
                                        </div>
                                        <div class="usage-session-meta">
                                            <span>{{ item.messageCount }} 消息</span>
                                            <span v-if="item.updatedAtLabel">{{ item.updatedAtLabel }}</span>
                                        </div>
                                        <div v-if="item.cwd" class="usage-session-path" :title="item.cwd">{{ item.cwd }}</div>
                                    </div>
                                </div>
                            </section>

                            <section class="usage-card">
                                <div class="usage-card-title">消息密度最高</div>
                                <div v-if="!sessionUsageCharts.topSessionsByMessages.length" class="usage-list-value">暂无会话数据</div>
                                <div v-else class="usage-session-list">
                                    <div v-for="item in sessionUsageCharts.topSessionsByMessages" :key="item.key + '-messages'" class="usage-session-item">
                                        <div class="usage-session-row">
                                            <div class="usage-session-title" :title="item.title">{{ item.title }}</div>
                                            <div class="usage-inline-stat">{{ item.messageCount }} 消息</div>
                                        </div>
                                        <div class="usage-session-meta">
                                            <span>{{ item.sourceLabel }}</span>
                                            <span v-if="item.updatedAtLabel">{{ item.updatedAtLabel }}</span>
                                        </div>
                                        <div v-if="item.cwd" class="usage-session-path" :title="item.cwd">{{ item.cwd }}</div>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </template>
                </div>
