name: coderabbit-review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: coderabbit-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trigger-review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Request CodeRabbit review
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const markerRegex = /<!-- codexmate-coderabbit-review-commit-count: (\d+) -->/;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            let previousCommitCount = null;
            for (const comment of comments.slice().reverse()) {
              const match = comment.body?.match(markerRegex);
              if (!match) {
                continue;
              }

              previousCommitCount = Number(match[1]);
              break;
            }

            if (previousCommitCount === pr.commits) {
              core.info(
                `Skipping CodeRabbit re-review comment because commit count is unchanged at ${pr.commits}.`
              );
              return;
            }

            const body = [
              "@coderabbitai re-review",
              "Stop making breaking changes, do a proper review!",
              "If I merge this directly, will it introduce any regressions? Please list only the impacted issues. Do not include style suggestions, speculative concerns, or already-resolved items.",
              `<!-- codexmate-coderabbit-review-commit-count: ${pr.commits} -->`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
